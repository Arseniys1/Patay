server {
    listen 8090;
    server_name _;

    # Simulate realistic API backend
    location /api/ {
        add_header Content-Type "application/json; charset=utf-8";
        return 200 '{"backend":"nginx","method":"$request_method","path":"$request_uri","status":"ok"}';
    }

    location = /auth/login {
        add_header Content-Type "application/json; charset=utf-8";
        return 200 '{"backend":"nginx","token":"fake-jwt-for-user","expiresIn":3600}';
    }

    location /auth/ {
        add_header Content-Type "application/json; charset=utf-8";
        return 200 '{"backend":"nginx","endpoint":"auth","authenticated":true}';
    }

    location /webhook/ {
        add_header Content-Type "application/json; charset=utf-8";
        return 200 '{"backend":"nginx","endpoint":"webhook","received":true}';
    }

    location /health {
        add_header Content-Type "application/json; charset=utf-8";
        return 200 '{"status":"ok","backend":"nginx"}';
    }

    location /static/ {
        add_header Content-Type "text/plain";
        return 200 'static file content';
    }

    location / {
        add_header Content-Type "text/html; charset=utf-8";
        return 200 '<html><body><h1>Nginx Backend</h1><p>Encrypt Proxy test backend</p></body></html>';
    }
}
