services:

  # ── Encrypt Proxy (Go) ─────────────────────────────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      BACKEND_URL: "http://backend:8090"
      LOG_LEVEL:   "debug"
    volumes:
      - ./docker/config.yaml:/etc/encryptproxy/config.yaml:ro
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ── Backend — nginx (default) ───────────────────────────────────────────────
  backend:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/health | grep -q ok"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Test client (Node.js) ──────────────────────────────────────────────────
  client:
    build:
      context: ./docker/client
    environment:
      PROXY_URL: "http://proxy:8080"
    depends_on:
      proxy:
        condition: service_healthy
    profiles:
      - test
